name: Validate Datasets

on:
  push:
    paths:
      - "data/**"
      - "scripts/**"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "data/**"
      - "scripts/**"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate datasets
        run: python3 scripts/validate_datasets.py
